                    ? (() => {
                        const size = customDigits.length;
                        const best = getCombinations(Array.from({ length: 10 }, (_, digit) => digit), size)
                            .map(combo => ({ combo, passCount: scoreCustomCutDigits(displayRows, combo) }))
                            .sort((a, b) =>
                                b.passCount - a.passCount ||
                                a.combo.join('').localeCompare(b.combo.join(''))
                            )[0];
                        return best ? ` | สูงสุด ${best.combo.join('')} ${best.passCount}/${displayRows.length}` : '';
                    })()
                    : '';
                customBacktestSummary.innerText = customDigits.length
                    ? `ถูก ${passCount}/${testedResults.length} งวด${bestText}`
                    : '';
            }

            const allDigits = Array.from({ length: 10 }, (_, digit) => digit);
            const getSelectedWinDigitCount = () => {
                const select = document.getElementById('recent-win-digit-count');
                const count = select ? Number(select.value) : state.recentWinDigitCount;
                return [7, 8, 9].includes(count) ? count : 7;
            };
            const applyWinDigitCount = (digits, count, fillMissing = true) => {
                const uniqueDigits = [...new Set((digits || []).map(Number).filter(digit => Number.isInteger(digit) && digit >= 0 && digit <= 9))];
                if (!fillMissing && uniqueDigits.length === 0) return [];
                const withFallback = [
                    ...uniqueDigits,
                    ...(fillMissing ? allDigits.filter(digit => !uniqueDigits.includes(digit)) : []),
                ];
                return withFallback.slice(0, count).sort((a, b) => a - b);
            };
            const parsePredictionDigits = (value) => [...new Set(String(value || '').match(/\d/g) || [])].map(Number);
            const getPredictionDigitsForRecord = (groupKey, date, dateObject, winDigitCount) => {
                if (!['hanoi', 'lao'].includes(groupKey)) return [];
                const rows = state.groupTop3PredictionRows[groupKey] || [];
                const rowDayLabel = dateObject ? getDayLabel(dateObject.getUTCDay()) : '';
                const prediction = rows.find(item =>
                    item.date === date &&
                    item.dayLabel === rowDayLabel
                ) || rows.find(item => item.date === date);
                if (!prediction) return [];
                const digitText = winDigitCount === 9
                    ? prediction.winDigits9
                    : winDigitCount === 8
                        ? prediction.winDigits8
                        : prediction.winDigits7;
                return parsePredictionDigits(digitText);
            };
            const getCurrentPredictionDigits = (groupKey, winDigitCount) => {
                const selectedDateObject = parseDateInputValue(state.recentResultDateFilter);
                if (selectedDateObject) {
                    return getPredictionDigitsForRecord(
                        groupKey,
                        formatDateObjectForRowKey(selectedDateObject),
                        selectedDateObject,
                        winDigitCount
                    );
                }
                if (['hanoi', 'lao'].includes(groupKey)) {
                    const liveStats = buildGroupTop3Frequency(groupKey);
                    const liveDigits = getGroupTop3WinDigitsByCount(liveStats, winDigitCount);
                    if (liveDigits.length) return liveDigits;
                }
                const targetDayIndex = state.recentResultDayFilter !== -1
                    ? state.recentResultDayFilter
                    : state.groupTop3DayFilter;
                const target = getGroupTop3PredictionTargetDate(targetDayIndex);
                return getPredictionDigitsForRecord(groupKey, target.date, target.dateISO ? new Date(target.dateISO) : null, winDigitCount);
            };
            const formatDigitSet = (digits) => digits
                .filter(digit => Number.isInteger(digit))
                .sort((a, b) => a - b)
                .join('');
            const formatShortDate = (dateText) => {
                const [day, month, yearText] = String(dateText || '').split('/').map(Number);
                if (!day || !month || !yearText) return escapeHtml(dateText || '-');
                const buddhistYear = yearText > 2400 ? yearText : yearText + 543;
                return `${day}/${month}/${String(buddhistYear).slice(-2)}`;
            };
            const evaluateWinLine = (row, winDigits) => {
                const winSet = new Set((winDigits || []).map(Number));
                if (winSet.size < 3) return { isPass: null };
                const topDigits = String(row.top3 || '').split('').map(Number).filter(num => !isNaN(num));
                return {
                    isPass: topDigits.length === 3 && topDigits.every(digit => winSet.has(digit)),
                };
            };
            const renderWinStatus = (result) => {
                if (result.isPass === null) {
                    return '<span class="font-bold text-slate-400">รอผล</span>';
                }
                return result.isPass
                    ? '<span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-violet-50 text-violet-700 text-2xl font-black leading-none">✓</span>'
                    : '<span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-rose-50 text-rose-600 text-2xl font-black leading-none">×</span>';
            };

            const selectedWinDigitCount = getSelectedWinDigitCount();
            const winDigitSelect = document.getElementById('recent-win-digit-count');
            if (winDigitSelect && winDigitSelect.value !== String(selectedWinDigitCount)) {
                winDigitSelect.value = String(selectedWinDigitCount);
            }
            const currentPredictionGroupKey = ['hanoi', 'lao'].includes(activeGroupKey) ? activeGroupKey : null;
            const fallbackWinDigits = applyWinDigitCount(
                getCurrentPredictionDigits(currentPredictionGroupKey, selectedWinDigitCount),
                selectedWinDigitCount,
                false
            );
            const lineItems = recentRows.map(item => {
                const winDigits = applyWinDigitCount(
                    getPredictionDigitsForRecord(item.groupKey, item.row.date, item.row.dateObject, selectedWinDigitCount),
                    selectedWinDigitCount,
                    false
                );
                const displayDigits = winDigits.length ? winDigits : [];
                const result = evaluateWinLine(item.row, displayDigits);
                return {
                    ...item,
                    digitsText: formatDigitSet(displayDigits),
                    result,
                };
            });
            const evaluatedLines = lineItems.filter(item => item.result.isPass !== null);
            const passCount = evaluatedLines.filter(item => item.result.isPass).length;
            const currentDigitsText = formatDigitSet(fallbackWinDigits);
            const formulaDigitCount = selectedWinDigitCount;
            const selectedDateObject = parseDateInputValue(state.recentResultDateFilter);
            const selectedDateText = selectedDateObject ? formatShortDate(formatDateObjectForRowKey(selectedDateObject)) : '';
            const dayFilterText = state.recentResultDayFilter !== -1 ? getDayLabel(state.recentResultDayFilter) : 'ทุกวัน';
            const resultUnit = viewMeta.isGroupView ? 'รายการ' : 'รอบ';
            const summarySuffix = selectedDateObject
                ? `ของวันที่ ${selectedDateText}`
                : state.recentResultDayFilter !== -1
                    ? `ล่าสุด (${dayFilterText})`
                    : 'ล่าสุด';
            const waitingLabel = selectedDateObject ? 'เลขวินของวันที่เลือก' : 'กำลังรอผล';
            const emptyMessage = selectedDateObject
                ? `ไม่พบผลของวันที่ ${selectedDateText} ใน ${viewMeta.title}`
                : `ยังไม่มีข้อมูลย้อนหลังสำหรับ ${viewMeta.title}`;

            tableBody.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <div class="text-center pb-5 mb-5 border-b-2 border-slate-300">
                        <div class="text-base font-semibold text-slate-500">${escapeHtml(viewMeta.title)}</div>
                        <div class="mt-1 text-4xl font-bold text-slate-950 leading-tight">วิน 3 ตัวบน ${formulaDigitCount || '-'} ตัว</div>
                        <div class="mt-2 text-2xl font-semibold text-slate-700">ถูก ${passCount} ครั้งจาก ${evaluatedLines.length} ${resultUnit}${summarySuffix}</div>
                        <div class="mt-1 text-sm font-semibold text-slate-400">แสดงข้อมูล: ${escapeHtml(selectedDateObject ? `วันที่ ${selectedDateText}` : dayFilterText)}</div>
                    </div>
                    <div class="max-h-[560px] overflow-y-auto pr-1 space-y-2">
                        <div class="flex flex-wrap items-center gap-x-2 gap-y-1 pb-3 text-xl md:text-2xl leading-snug text-slate-950">
                            <span>${waitingLabel}</span>
                            <span>=</span>
                            <span class="font-mono border-4 border-rose-600 px-2 leading-tight">${currentDigitsText || '-'}</span>
                            <span>=</span>
                            <span>รอผล</span>
                        </div>
                        ${lineItems.length ? lineItems.map(item => `
                            <div class="flex flex-wrap items-center gap-x-2 gap-y-1 text-xl md:text-2xl leading-snug text-slate-950">
                                ${viewMeta.isGroupView ? `<span class="inline-flex items-center px-2 py-1 rounded bg-slate-100 text-sm md:text-base font-bold text-slate-600">${escapeHtml(item.sourceName)}</span>` : ''}
                                <span class="font-mono">${formatShortDate(item.row.date)}</span>
                                <span>=</span>
                                <span class="font-mono">${item.digitsText || '-'}</span>
                                <span>=</span>
                                <span class="font-mono">${item.row.top3}</span>
                                ${renderWinStatus(item.result)}
                            </div>
                        `).join('') : `
                            <div class="py-10 text-center text-slate-400 font-bold">${escapeHtml(emptyMessage)}</div>
                        `}
                    </div>
                </div>
            `;
        }

        function createStatPanel(title, dataArr, mostFrequent, barColorClass, textColorClass, headerBgClass) {
            // ปรับ Scale ของกราฟให้แท่งที่เยอะสุดยาว 100% เพื่อให้เห็นความแตกต่างชัดเจน
            const maxFrequency = mostFrequent.maxCount || 1;

            // จับคู่ตัวเลขกับจำนวนครั้ง แล้วจัดเรียงจากมากไปน้อย
            const sortedData = dataArr
                .map((count, num) => ({ num, count }))
                .sort((a, b) => b.count - a.count);

            let rowsHtml = sortedData.map(item => {
                const count = item.count;
                const num = item.num;

                // คำนวณความยาวกราฟแท่งเทียบกับตัวที่ออกบ่อยสุด
                const relativePercentage = (count / maxFrequency) * 100 || 0;
                // คำนวณเปอร์เซ็นต์จริงๆ เทียบกับจำนวนงวดทั้งหมด (เอาไว้แสดงเป็นตัวเลข)
                const absolutePercentage = ((count / (state.data.length || 1)) * 100).toFixed(1);

                const isHighlight = mostFrequent.numbers.includes(num);

                const numColor = isHighlight ? `font-black ${textColorClass}` : 'font-medium text-slate-500';
                const barColor = isHighlight ? barColorClass : 'bg-slate-300';
                const bgColor = isHighlight ? headerBgClass : 'bg-transparent';

                return `
                    <div class="flex items-center text-sm p-1.5 rounded-md ${bgColor}">
                        <div class="w-6 text-center ${numColor} text-base">${num}</div>
                        <div class="flex-1 mx-3 h-5 bg-slate-100 rounded-md overflow-hidden flex items-center relative shadow-inner">
                            <div class="h-full rounded-md progress-bar-fill ${barColor}" data-width="${Math.max(relativePercentage, 2)}%" style="width: 0%;"></div>
                        </div>
                        <div class="w-14 text-right flex flex-col justify-center">
                            <span class="font-mono font-bold text-slate-700 leading-none">${count} <span class="text-[10px] font-sans font-normal text-slate-400">ครั้ง</span></span>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="px-4 py-3 border-b border-slate-100 flex items-center ${headerBgClass} ${textColorClass}">
                        <div class="flex items-center space-x-2 font-bold">
                            <i data-lucide="target" class="w-4 h-4"></i>
                            <span>${title}</span>
                        </div>
                    </div>
                    <div class="p-3 space-y-1">
                        ${rowsHtml}
                    </div>
                </div>
            `;
        }

        // --- 6. Event Handlers ---
        window.changeRecentResultView = function (viewKey) {
            state.recentResultView = normalizeRecentResultView(viewKey);
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.changeRecentResultDayFilter = function (dayIndex) {
            state.recentResultDayFilter = Number.isInteger(dayIndex) && dayIndex >= -1 && dayIndex <= 6
                ? dayIndex
                : -1;
            state.groupTop3DayFilter = state.recentResultDayFilter;
            renderGroupTop3StatsPanel();
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.changeRecentResultDateFilter = function (value) {
            state.recentResultDateFilter = parseDateInputValue(value) ? value : '';
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.clearRecentResultDateFilter = function () {
            state.recentResultDateFilter = '';
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.changeRecentWinDigitCount = function (count) {
            state.recentWinDigitCount = [7, 8, 9].includes(count) ? count : 7;
            state.groupTop3WinDigitCount = state.recentWinDigitCount;
            renderGroupTop3StatsPanel();
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.changeSheet = function (index) {
            state.activeSheet = SHEETS[index];
            fetchSheetData();
        };

        window.changeSheetBySlug = function (slug) {
            const nextSheet = SHEETS.find(sheet => sheet.slug === slug);
            if (!nextSheet) return;
            state.activeSheet = nextSheet;
            document.querySelectorAll('.lottery-dropdown.open').forEach(dropdown => {
                dropdown.classList.remove('open');
            });
            fetchSheetData();
        };

        window.toggleLotteryMenu = function (event, groupKey) {
            event.stopPropagation();
            const targetMenu = document.getElementById(`lottery-menu-${groupKey}`);
            if (!targetMenu) return;
            const targetDropdown = targetMenu.closest('.lottery-dropdown');
            const isOpen = targetDropdown.classList.contains('open');

            document.querySelectorAll('.lottery-dropdown.open').forEach(dropdown => {
                dropdown.classList.remove('open');
            });

            if (!isOpen) {
                targetDropdown.classList.add('open');
            }
        };

        window.changePeriod = function (days) {
            state.period = days;
            fetchSheetData();
        };

        window.changeDayFilter = function (dayIndex) {
            state.dayFilter = dayIndex;
            fetchSheetData();
        };

        window.changeGroupTop3DayFilter = function (dayIndex) {
            state.groupTop3DayFilter = Number.isInteger(dayIndex) && dayIndex >= -1 && dayIndex <= 6
                ? dayIndex
                : -1;
            state.recentResultDayFilter = state.groupTop3DayFilter;
            renderGroupTop3StatsPanel();
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.changeGroupTop3WinDigitCount = function (count) {
            state.groupTop3WinDigitCount = [7, 8, 9].includes(count) ? count : 7;
            state.recentWinDigitCount = state.groupTop3WinDigitCount;
            renderGroupTop3StatsPanel();
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        };

        window.reloadGroupTop3Stats = function () {
            loadGroupTop3Stats(true);
        };

        window.copyCombos = function () {
            const hiddenText = document.getElementById('combo-hidden-text');
            if (!hiddenText) return;
            const text = hiddenText.value;
            const tempInput = document.createElement("textarea");
            tempInput.style.position = "absolute";
            tempInput.style.left = "-9999px";
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            const btn = document.getElementById('btn-copy-combo');
            if (!btn) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5 mr-1"></i> คัดลอกสำเร็จ!';
            btn.classList.add('bg-emerald-100', 'text-emerald-700');
            btn.classList.remove('bg-indigo-100', 'text-indigo-700');
            if (window.lucide) lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('bg-emerald-100', 'text-emerald-700');
                btn.classList.add('bg-indigo-100', 'text-indigo-700');
                if (window.lucide) lucide.createIcons();
            }, 2000);
        };

        window.copyTop3WinNumbers = function () {
            const text = document.getElementById('top3-win-hidden-text').value;
            if (!text) return;

            const tempInput = document.createElement("textarea");
            tempInput.style.position = "absolute";
            tempInput.style.left = "-9999px";
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            const btn = document.getElementById('btn-copy-top3-win');
            if (!btn) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5 mr-1"></i> คัดลอกแล้ว';
            btn.classList.add('bg-emerald-600');
            btn.classList.remove('bg-indigo-600');
            if (window.lucide) lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('bg-emerald-600');
                btn.classList.add('bg-indigo-600');
                if (window.lucide) lucide.createIcons();
            }, 2000);
        };

        // --- 8. เริ่มทำงานเมื่อเปิดหน้าเว็บ ---
        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('click', () => {
                document.querySelectorAll('.lottery-dropdown.open').forEach(dropdown => {
                    dropdown.classList.remove('open');
                });
            });
            renderNavigations();
            updateRefreshStatus(); // แสดงสถานะเริ่มต้น "ปิดใช้งาน"
            if (window.lucide) {
                lucide.createIcons();
            }
            fetchSheetData();
        });

    </script>
</body>

</html>
