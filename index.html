<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์สถิติหวย</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* ซ่อน content ที่ยังไม่ได้โหลด */
        .hidden-temp {
            display: none !important;
        }

        /* Smooth transition สำหรับ Progress Bar */
        .progress-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lottery-dropdown-menu {
            display: none;
        }

        .lottery-dropdown.open .lottery-dropdown-menu,
        .lottery-dropdown:hover .lottery-dropdown-menu {
            display: block;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-50 text-slate-800 pb-12">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white pt-10 pb-6 px-4 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center space-x-3 mb-4 md:mb-0">
                <div class="bg-white p-2 rounded-full text-blue-700 flex items-center justify-center">
                    <i data-lucide="bar-chart-3" class="w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">ระบบวิเคราะห์สถิติหวย</h1>

                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-2 w-full md:w-auto justify-center mt-4 md:mt-0">
                <div class="flex items-center bg-black bg-opacity-20 rounded-lg p-1" id="period-selectors">
                    <!-- ปุ่มเลือกวันจะถูกแทรกด้วย JS -->
                </div>
                <div class="flex items-center bg-black bg-opacity-20 rounded-lg p-1" id="day-filter-selectors">
                    <!-- ปุ่มเลือกวันของสัปดาห์จะถูกแทรกด้วย JS -->
                </div>
            </div>

            <!-- Auto Refresh Toggle -->
            <div class="flex items-center gap-2 text-white text-sm mt-4 md:mt-0 md:ml-6">
                <label for="auto-refresh-toggle" class="font-medium cursor-pointer select-none">อัปเดตอัตโนมัติ</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="auto-refresh-toggle" class="sr-only peer"
                        onchange="toggleAutoRefresh(this.checked)">
                    <div class="w-9 h-5 bg-gray-400 rounded-full peer peer-checked:bg-green-500"></div>
                    <div
                        class="absolute top-0.5 left-[2px] w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-full">
                    </div>
                </label>
                <span id="refresh-status" class="text-xs text-blue-200 w-28 text-left ml-2"></span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 -mt-4">
        <!-- Sheet Selectors (Tabs) -->
        <div class="relative z-30 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-8" id="sheet-selectors">
            <!-- แท็บชีตจะถูกแทรกด้วย JS -->
        </div>

        <!-- Status / Error -->
        <div id="error-container"
            class="hidden-temp bg-amber-50 border border-amber-200 text-amber-700 p-4 rounded-lg mb-6 flex items-center space-x-3 shadow-sm">
            <i data-lucide="alert-triangle" class="w-6 h-6 flex-shrink-0 text-amber-500"></i>
            <span id="error-text" class="text-sm font-medium"></span>
        </div>

        <!-- Loading State -->
        <div id="loading-container" class="flex flex-col items-center justify-center py-20 text-blue-600">
            <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4"></i>
            <p class="font-medium text-slate-500">กำลังประมวลผลข้อมูลสถิติ...</p>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard-content" class="hidden-temp space-y-8 animate-fade-in">
            <div id="exphuay-catalog-panel" style="display: none !important;"
                class="hidden-temp bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-emerald-50 px-6 py-4 border-b border-emerald-100 flex items-center justify-between gap-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="database" class="w-5 h-5 text-emerald-600"></i>
                        <h3 class="font-bold text-emerald-800">รายการหวยที่ระบบจะลองดึงจาก LottoTH</h3>
                    </div>
                    <span id="exphuay-catalog-count" class="text-xs font-bold text-emerald-700"></span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-100 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold">ชื่อหวย</th>
                                <th class="px-4 py-3 font-semibold">Slug</th>
                                <th class="px-4 py-3 font-semibold">ประเภท</th>
                                <th class="px-4 py-3 font-semibold">เวลา</th>
                                <th class="px-4 py-3 font-semibold text-center">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="exphuay-catalog-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- Group Top 3-Digit Digit Frequency -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div
                    class="bg-sky-50 px-6 py-4 border-b border-sky-100 flex flex-col lg:flex-row lg:items-center justify-between gap-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="list-ordered" class="w-5 h-5 text-sky-600"></i>
                        <h3 class="font-bold text-sky-800">สถิติตัวเลข 0-9 ในเลข 3 ตัวบนรวมกลุ่ม</h3>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 text-sm font-semibold text-sky-800">
                        <label for="group-top3-win-digit-count" class="whitespace-nowrap">เลือกวิน:</label>
                        <select id="group-top3-win-digit-count" onchange="window.changeGroupTop3WinDigitCount(Number(this.value))"
                            class="bg-white border border-sky-200 text-sky-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-1.5 font-bold outline-none shadow-sm cursor-pointer">
                            <option value="7">วิน 7</option>
                            <option value="8">วิน 8</option>
                            <option value="9">วิน 9</option>
                        </select>
                        <label for="group-top3-day-filter" class="whitespace-nowrap">เลือกวัน:</label>
                        <select id="group-top3-day-filter" onchange="window.changeGroupTop3DayFilter(Number(this.value))"
                            class="bg-white border border-sky-200 text-sky-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-1.5 font-bold outline-none shadow-sm cursor-pointer">
                            <option value="-1">รวมทุกวัน</option>
                            <option value="0">วันอาทิตย์</option>
                            <option value="1">วันจันทร์</option>
                            <option value="2">วันอังคาร</option>
                            <option value="3">วันพุธ</option>
                            <option value="4">วันพฤหัสบดี</option>
                            <option value="5">วันศุกร์</option>
                            <option value="6">วันเสาร์</option>
                        </select>
                        <button type="button" onclick="window.reloadGroupTop3Stats()"
                            class="bg-white hover:bg-sky-100 text-sky-700 border border-sky-200 px-3 py-1.5 rounded-md inline-flex items-center transition font-bold">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5 mr-1"></i> รีเฟรช
                        </button>
                    </div>
                </div>
                <div class="p-6">
                    <div id="group-top3-status" class="mb-4 text-sm font-semibold text-slate-500"></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="group-top3-stats-grid">
                        <!-- การ์ดสถิติหวยฮานอยทั้งหมดและหวยลาวทั้งหมด จะถูกแทรกด้วย JS -->
                    </div>
                </div>
            </div>

            <!-- Top 3-Digit Win Builder -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex items-center space-x-2">
                    <i data-lucide="shuffle" class="w-5 h-5 text-indigo-600"></i>
                    <h3 class="font-bold text-indigo-800">วินเลข 3 ตัวบน</h3>
                </div>
                <div class="p-6">
                    <div class="flex flex-col lg:flex-row lg:items-end gap-3">
                        <div class="flex-1">
                            <label for="top3-win-input"
                                class="block text-sm font-bold text-indigo-800 mb-1">ใส่เลขสำหรับวิน 3 ตัวบน</label>
                            <input id="top3-win-input" type="text" inputmode="numeric"
                                oninput="window.handleTop3WinInputChange()" placeholder="เช่น 1 2 3 4"
                                class="w-full bg-white border border-indigo-200 rounded-md px-3 py-2 text-sm font-bold text-indigo-800 outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
                        </div>
                        <div class="flex items-center justify-between lg:justify-end gap-3">
                            <div class="text-sm font-semibold text-indigo-800 whitespace-nowrap">ได้ <span
                                    id="top3-win-count" class="font-mono text-base">0</span> ชุด</div>
                            <button id="btn-copy-top3-win" type="button" onclick="copyTop3WinNumbers()"
                                class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-md flex items-center transition font-bold">
                                <i data-lucide="copy" class="w-3.5 h-3.5 mr-1"></i> คัดลอก
                            </button>
                        </div>
                    </div>
                    <label
                        class="mt-3 inline-flex items-center gap-2 text-sm font-semibold text-indigo-800 select-none cursor-pointer">
                        <input id="top3-include-repeat" type="checkbox" class="w-4 h-4 accent-indigo-600" checked
                            onchange="window.updateTop3WinNumbers(); renderRecentDataTable();">
                        รวมเลขเบิ้ล/หาม
                    </label>
                    <div id="top3-win-grid"
                        class="mt-3 grid grid-cols-4 sm:grid-cols-6 md:grid-cols-9 lg:grid-cols-12 gap-2 max-h-[180px] overflow-y-auto p-3 bg-slate-50 border border-slate-200 rounded-lg shadow-inner">
                        <div class="col-span-full text-center text-sm text-slate-400 py-2">ใส่เลขเพื่อสร้างวิน 3 ตัวบน
                        </div>
                    </div>
                    <input type="hidden" id="top3-win-hidden-text">
                </div>
            </div>

            <!-- 3-Digit Combinations -->
            <!-- Recent Data Table (Preview) -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 space-y-3">
                    <!-- Row 1: Title + Tabs -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="calendar-days" class="w-5 h-5 text-slate-500"></i>
                            <h3 class="font-bold text-slate-700" id="table-title">ข้อมูลที่ใช้คำนวณ</h3>
                        </div>
                        <div class="flex flex-wrap items-center gap-1 rounded-lg bg-white border border-slate-200 p-1 shadow-sm"
                            role="tablist" aria-label="เลือกรูปแบบข้อมูลย้อนหลัง">
                            <button type="button" data-recent-result-view="single" onclick="window.changeRecentResultView('single')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition bg-sky-600 text-white shadow-sm">
                                หวยเดี่ยว
                            </button>
                            <button type="button" data-recent-result-view="hanoi" onclick="window.changeRecentResultView('hanoi')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition text-slate-600 hover:bg-sky-50 hover:text-sky-700">
                                ฮานอยรวม 9
                            </button>
                            <button type="button" data-recent-result-view="lao" onclick="window.changeRecentResultView('lao')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition text-slate-600 hover:bg-sky-50 hover:text-sky-700">
                                ลาวรวม 14
                            </button>
                        </div>
                    </div>

                    <!-- Row 2: Date Filters -->
                    <div class="flex flex-wrap items-center gap-x-3 gap-y-2 text-xs">
                        <div class="flex items-center gap-1.5">
                            <label for="recent-result-day-filter" class="font-bold text-slate-700 whitespace-nowrap">ดูวัน:</label>
                            <select id="recent-result-day-filter" onchange="window.changeRecentResultDayFilter(Number(this.value))"
                                class="bg-white border border-slate-200 text-slate-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-2 font-bold outline-none shadow-sm cursor-pointer">
                                <option value="-1">ทุกวัน</option>
                                <option value="0">วันอาทิตย์</option>
                                <option value="1">วันจันทร์</option>
                                <option value="2">วันอังคาร</option>
                                <option value="3">วันพุธ</option>
                                <option value="4">วันพฤหัสบดี</option>
                                <option value="5">วันศุกร์</option>
                                <option value="6">วันเสาร์</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <label for="recent-result-date-filter" class="font-bold text-slate-700 whitespace-nowrap">วันที่:</label>
                            <input id="recent-result-date-filter" type="date" onchange="window.changeRecentResultDateFilter(this.value)"
                                class="bg-white border border-slate-200 rounded-md px-3 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400">
                            <button type="button" onclick="window.clearRecentResultDateFilter()"
                                class="bg-white hover:bg-slate-100 text-slate-600 border border-slate-200 px-3 py-2 rounded-md font-bold transition whitespace-nowrap">
                                ล้างวันที่
                            </button>
                        </div>
                    </div>

                    <!-- Row 3: Win + Repeat + Backtest -->
                    <div class="flex flex-wrap items-center gap-x-3 gap-y-2 text-xs">
                        <div class="flex items-center gap-1.5">
                            <label for="recent-win-digit-count" class="font-bold text-slate-700 whitespace-nowrap">เลือกวิน:</label>
                            <select id="recent-win-digit-count" onchange="window.changeRecentWinDigitCount(Number(this.value))"
                                class="bg-white border border-slate-200 text-slate-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-2 font-bold outline-none shadow-sm cursor-pointer">
                                <option value="7">วิน 7</option>
                                <option value="8">วิน 8</option>
                                <option value="9">วิน 9</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <label for="recent-include-repeat" class="font-bold text-slate-700 whitespace-nowrap">เบิ้ลหาม:</label>
                            <select id="recent-include-repeat" onchange="window.changeRecentIncludeRepeat(this.value)"
                                class="bg-white border border-slate-200 text-slate-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-2 font-bold outline-none shadow-sm cursor-pointer">
                                <option value="yes">รวมเบิ้ลหาม</option>
                                <option value="no">ไม่รวมเบิ้ลหาม</option>
                            </select>
                        </div>
                        <div class="w-px h-6 bg-slate-300 hidden sm:block"></div>
                        <div class="flex items-center gap-1.5">
                            <label for="custom-cut-backtest-input" class="font-bold text-slate-700 whitespace-nowrap">เช็คเลขลบย้อนหลัง</label>
                            <input id="custom-cut-backtest-input" type="text" inputmode="numeric" maxlength="10"
                                oninput="window.updateCustomCutBacktest(this.value)" placeholder="เช่น 012"
                                class="w-24 bg-white border border-slate-200 rounded-md px-3 py-2 text-sm font-mono font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400">
                            <button type="button" onclick="window.findBestCustomCutBacktest()"
                                class="bg-sky-600 hover:bg-sky-700 text-white px-3 py-2 rounded-md font-bold transition whitespace-nowrap">
                                หาเลขดีที่สุด
                            </button>
                            <span id="custom-cut-backtest-summary" class="font-bold text-sky-700 whitespace-nowrap"></span>
                        </div>
                    </div>
                </div>
                <div id="recent-data-table" class="px-3 sm:px-6 py-5">
                    <!-- รายการย้อนหลังจะถูกแทรกด้วย JS -->
                </div>
            </div>

        </div>
    </main>
