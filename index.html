<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์สถิติหวย</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* ซ่อน content ที่ยังไม่ได้โหลด */
        .hidden-temp {
            display: none !important;
        }

        /* Smooth transition สำหรับ Progress Bar */
        .progress-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lottery-dropdown-menu {
            display: none;
        }

        .lottery-dropdown.open .lottery-dropdown-menu,
        .lottery-dropdown:hover .lottery-dropdown-menu {
            display: block;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-50 text-slate-800 pb-12">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white pt-10 pb-6 px-4 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center space-x-3 mb-4 md:mb-0">
                <div class="bg-white p-2 rounded-full text-blue-700 flex items-center justify-center">
                    <i data-lucide="bar-chart-3" class="w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">ระบบวิเคราะห์สถิติหวย</h1>

                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-2 w-full md:w-auto justify-center mt-4 md:mt-0">
                <div class="flex items-center bg-black bg-opacity-20 rounded-lg p-1" id="period-selectors">
                    <!-- ปุ่มเลือกวันจะถูกแทรกด้วย JS -->
                </div>
                <div class="flex items-center bg-black bg-opacity-20 rounded-lg p-1" id="day-filter-selectors">
                    <!-- ปุ่มเลือกวันของสัปดาห์จะถูกแทรกด้วย JS -->
                </div>
            </div>

            <!-- Auto Refresh Toggle -->
            <div class="flex items-center gap-2 text-white text-sm mt-4 md:mt-0 md:ml-6">
                <label for="auto-refresh-toggle" class="font-medium cursor-pointer select-none">อัปเดตอัตโนมัติ</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="auto-refresh-toggle" class="sr-only peer"
                        onchange="toggleAutoRefresh(this.checked)">
                    <div class="w-9 h-5 bg-gray-400 rounded-full peer peer-checked:bg-green-500"></div>
                    <div
                        class="absolute top-0.5 left-[2px] w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-full">
                    </div>
                </label>
                <span id="refresh-status" class="text-xs text-blue-200 w-28 text-left ml-2"></span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 -mt-4">
        <!-- Sheet Selectors (Tabs) -->
        <div class="relative z-30 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-8" id="sheet-selectors">
            <!-- แท็บชีตจะถูกแทรกด้วย JS -->
        </div>

        <!-- Status / Error -->
        <div id="error-container"
            class="hidden-temp bg-amber-50 border border-amber-200 text-amber-700 p-4 rounded-lg mb-6 flex items-center space-x-3 shadow-sm">
            <i data-lucide="alert-triangle" class="w-6 h-6 flex-shrink-0 text-amber-500"></i>
            <span id="error-text" class="text-sm font-medium"></span>
        </div>

        <!-- Loading State -->
        <div id="loading-container" class="flex flex-col items-center justify-center py-20 text-blue-600">
            <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4"></i>
            <p class="font-medium text-slate-500">กำลังประมวลผลข้อมูลสถิติ...</p>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard-content" class="hidden-temp space-y-8 animate-fade-in">
            <div id="exphuay-catalog-panel" style="display: none !important;"
                class="hidden-temp bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-emerald-50 px-6 py-4 border-b border-emerald-100 flex items-center justify-between gap-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="database" class="w-5 h-5 text-emerald-600"></i>
                        <h3 class="font-bold text-emerald-800">รายการหวยที่ระบบจะลองดึงจาก LottoTH</h3>
                    </div>
                    <span id="exphuay-catalog-count" class="text-xs font-bold text-emerald-700"></span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-100 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold">ชื่อหวย</th>
                                <th class="px-4 py-3 font-semibold">Slug</th>
                                <th class="px-4 py-3 font-semibold">ประเภท</th>
                                <th class="px-4 py-3 font-semibold">เวลา</th>
                                <th class="px-4 py-3 font-semibold text-center">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="exphuay-catalog-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- Group Top 3-Digit Digit Frequency -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div
                    class="bg-sky-50 px-6 py-4 border-b border-sky-100 flex flex-col lg:flex-row lg:items-center justify-between gap-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="list-ordered" class="w-5 h-5 text-sky-600"></i>
                        <h3 class="font-bold text-sky-800">สถิติตัวเลข 0-9 ในเลข 3 ตัวบนรวมกลุ่ม</h3>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 text-sm font-semibold text-sky-800">
                        <label for="group-top3-win-digit-count" class="whitespace-nowrap">เลือกวิน:</label>
                        <select id="group-top3-win-digit-count" onchange="window.changeGroupTop3WinDigitCount(Number(this.value))"
                            class="bg-white border border-sky-200 text-sky-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-1.5 font-bold outline-none shadow-sm cursor-pointer">
                            <option value="7">วิน 7</option>
                            <option value="8">วิน 8</option>
                            <option value="9">วิน 9</option>
                        </select>
                        <label for="group-top3-day-filter" class="whitespace-nowrap">เลือกวัน:</label>
                        <select id="group-top3-day-filter" onchange="window.changeGroupTop3DayFilter(Number(this.value))"
                            class="bg-white border border-sky-200 text-sky-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-1.5 font-bold outline-none shadow-sm cursor-pointer">
                            <option value="-1">รวมทุกวัน</option>
                            <option value="0">วันอาทิตย์</option>
                            <option value="1">วันจันทร์</option>
                            <option value="2">วันอังคาร</option>
                            <option value="3">วันพุธ</option>
                            <option value="4">วันพฤหัสบดี</option>
                            <option value="5">วันศุกร์</option>
                            <option value="6">วันเสาร์</option>
                        </select>
                        <button type="button" onclick="window.reloadGroupTop3Stats()"
                            class="bg-white hover:bg-sky-100 text-sky-700 border border-sky-200 px-3 py-1.5 rounded-md inline-flex items-center transition font-bold">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5 mr-1"></i> รีเฟรช
                        </button>
                    </div>
                </div>
                <div class="p-6">
                    <div id="group-top3-status" class="mb-4 text-sm font-semibold text-slate-500"></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="group-top3-stats-grid">
                        <!-- การ์ดสถิติหวยฮานอยทั้งหมดและหวยลาวทั้งหมด จะถูกแทรกด้วย JS -->
                    </div>
                </div>
            </div>

            <!-- Top 3-Digit Win Builder -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex items-center space-x-2">
                    <i data-lucide="shuffle" class="w-5 h-5 text-indigo-600"></i>
                    <h3 class="font-bold text-indigo-800">วินเลข 3 ตัวบน</h3>
                </div>
                <div class="p-6">
                    <div class="flex flex-col lg:flex-row lg:items-end gap-3">
                        <div class="flex-1">
                            <label for="top3-win-input"
                                class="block text-sm font-bold text-indigo-800 mb-1">ใส่เลขสำหรับวิน 3 ตัวบน</label>
                            <input id="top3-win-input" type="text" inputmode="numeric"
                                oninput="window.handleTop3WinInputChange()" placeholder="เช่น 1 2 3 4"
                                class="w-full bg-white border border-indigo-200 rounded-md px-3 py-2 text-sm font-bold text-indigo-800 outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
                        </div>
                        <div class="flex items-center justify-between lg:justify-end gap-3">
                            <div class="text-sm font-semibold text-indigo-800 whitespace-nowrap">ได้ <span
                                    id="top3-win-count" class="font-mono text-base">0</span> ชุด</div>
                            <button id="btn-copy-top3-win" type="button" onclick="copyTop3WinNumbers()"
                                class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-md flex items-center transition font-bold">
                                <i data-lucide="copy" class="w-3.5 h-3.5 mr-1"></i> คัดลอก
                            </button>
                        </div>
                    </div>
                    <label
                        class="mt-3 inline-flex items-center gap-2 text-sm font-semibold text-indigo-800 select-none cursor-pointer">
                        <input id="top3-include-repeat" type="checkbox" class="w-4 h-4 accent-indigo-600" checked
                            onchange="window.updateTop3WinNumbers(); renderRecentDataTable();">
                        รวมเลขเบิ้ล/หาม
                    </label>
                    <div id="top3-win-grid"
                        class="mt-3 grid grid-cols-4 sm:grid-cols-6 md:grid-cols-9 lg:grid-cols-12 gap-2 max-h-[180px] overflow-y-auto p-3 bg-slate-50 border border-slate-200 rounded-lg shadow-inner">
                        <div class="col-span-full text-center text-sm text-slate-400 py-2">ใส่เลขเพื่อสร้างวิน 3 ตัวบน
                        </div>
                    </div>
                    <input type="hidden" id="top3-win-hidden-text">
                </div>
            </div>

            <!-- 3-Digit Combinations -->
            <!-- Recent Data Table (Preview) -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-8">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex flex-col xl:flex-row xl:items-center justify-between gap-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="calendar-days" class="w-5 h-5 text-slate-500"></i>
                        <h3 class="font-bold text-slate-700" id="table-title">ข้อมูลที่ใช้คำนวณ</h3>
                    </div>
                    <div class="flex flex-col xl:flex-row xl:items-center gap-3">
                        <div class="flex flex-wrap items-center gap-1 rounded-lg bg-white border border-slate-200 p-1 shadow-sm"
                            role="tablist" aria-label="เลือกรูปแบบข้อมูลย้อนหลัง">
                            <button type="button" data-recent-result-view="single" onclick="window.changeRecentResultView('single')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition bg-sky-600 text-white shadow-sm">
                                หวยเดี่ยว
                            </button>
                            <button type="button" data-recent-result-view="hanoi" onclick="window.changeRecentResultView('hanoi')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition text-slate-600 hover:bg-sky-50 hover:text-sky-700">
                                ฮานอยรวม 9
                            </button>
                            <button type="button" data-recent-result-view="lao" onclick="window.changeRecentResultView('lao')"
                                class="px-3 py-2 rounded-md text-xs font-bold transition text-slate-600 hover:bg-sky-50 hover:text-sky-700">
                                ลาวรวม 14
                            </button>
                        </div>
                        <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-2 text-xs text-slate-600">
                            <label for="recent-result-day-filter" class="font-bold text-slate-700 whitespace-nowrap">ดูวัน:</label>
                            <select id="recent-result-day-filter" onchange="window.changeRecentResultDayFilter(Number(this.value))"
                                class="bg-white border border-slate-200 text-slate-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-2 font-bold outline-none shadow-sm cursor-pointer">
                                <option value="-1">ทุกวัน</option>
                                <option value="0">วันอาทิตย์</option>
                                <option value="1">วันจันทร์</option>
                                <option value="2">วันอังคาร</option>
                                <option value="3">วันพุธ</option>
                                <option value="4">วันพฤหัสบดี</option>
                                <option value="5">วันศุกร์</option>
                                <option value="6">วันเสาร์</option>
                            </select>
                            <label for="recent-result-date-filter" class="font-bold text-slate-700 whitespace-nowrap">วันที่:</label>
                            <input id="recent-result-date-filter" type="date" onchange="window.changeRecentResultDateFilter(this.value)"
                                class="bg-white border border-slate-200 rounded-md px-3 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400">
                            <button type="button" onclick="window.clearRecentResultDateFilter()"
                                class="bg-white hover:bg-slate-100 text-slate-600 border border-slate-200 px-3 py-2 rounded-md font-bold transition whitespace-nowrap">
                                ล้างวันที่
                            </button>
                            <label for="recent-win-digit-count" class="font-bold text-slate-700 whitespace-nowrap">เลือกวิน:</label>
                            <select id="recent-win-digit-count" onchange="window.changeRecentWinDigitCount(Number(this.value))"
                                class="bg-white border border-slate-200 text-slate-700 text-sm rounded-md focus:ring-sky-500 focus:border-sky-500 p-2 font-bold outline-none shadow-sm cursor-pointer">
                                <option value="7">วิน 7</option>
                                <option value="8">วิน 8</option>
                                <option value="9">วิน 9</option>
                            </select>
                            <label for="custom-cut-backtest-input" class="font-bold text-slate-700 whitespace-nowrap">เช็คเลขลบย้อนหลัง</label>
                            <input id="custom-cut-backtest-input" type="text" inputmode="numeric" maxlength="10"
                                oninput="window.updateCustomCutBacktest(this.value)" placeholder="เช่น 012"
                                class="w-full sm:w-32 bg-white border border-slate-200 rounded-md px-3 py-2 text-sm font-mono font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400">
                            <button type="button" onclick="window.findBestCustomCutBacktest()"
                                class="bg-sky-600 hover:bg-sky-700 text-white px-3 py-2 rounded-md font-bold transition whitespace-nowrap">
                                หาเลขดีที่สุด
                            </button>
                            <span id="custom-cut-backtest-summary" class="font-bold text-sky-700 whitespace-nowrap"></span>
                        </div>
                    </div>
                </div>
                <div id="recent-data-table" class="px-6 py-5">
                    <!-- รายการย้อนหลังจะถูกแทรกด้วย JS -->
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 1. การตั้งค่าและการจัดการ State ---
        const LOTTERY_GROUPS = [
            {
                key: 'hanoi',
                label: 'สถิติหวยฮานอย ย้อนหลัง',
                sheets: [
                    { slug: 'xosohd', name: 'ฮานอย HD' },
                    { slug: 'minhngocstar', name: 'ฮานอยสตาร์' },
                    { slug: 'minhngoctv', name: 'ฮานอยทีวี' },
                    { slug: 'xstachroi', name: 'ฮานอยเฉพาะกิจ' },
                    { slug: 'xosoredcross', name: 'ฮานอยกาชาด' },
                    { slug: 'xsthm', name: 'ฮานอยพิเศษ' },
                    { slug: 'minhngoc', name: 'ฮานอยปกติ' },
                    { slug: 'xosodevelop', name: 'ฮานอยพัฒนา' },
                    { slug: 'mlnhngo', name: 'ฮานอย VIP' },
                ],
            },
            {
                key: 'lao',
                label: 'สถิติหวยลาว ย้อนหลัง',
                sheets: [
                    { slug: 'laopatuxay', name: 'ลาวประตูชัย' },
                    { slug: 'laosantipap', name: 'ผลหวยลาวสันติภาพ' },
                    { slug: 'laocitizen', name: 'ผลหวยประชาชนลาว' },
                    { slug: 'laoextra', name: 'ลาว extra' },
                    { slug: 'laotv', name: 'ลาว TV' },
                    { slug: 'laosspecial', name: 'ลาว พิเศษ' },
                    { slug: 'laoshd', name: 'ลาว HD' },
                    { slug: 'laounion', name: 'ลาว สามัคคี' },
                    { slug: 'laounionvip', name: 'ลาว สามัคคี VIP' },
                    { slug: 'laostars', name: 'ลาวสตาร์' },
                    { slug: 'laostarsvip', name: 'ลาว สตาร์ VIP' },
                    { slug: 'laoredcross', name: 'ลาว กาชาด' },
                    { slug: 'laosvip', name: 'ลาว VIP' },
                    { slug: 'laosdevelops', name: 'ลาวพัฒนา' },
                ],
            },
            {
                key: 'stock-normal',
                label: 'สถิติหวยหุ้นปกติ ย้อนหลัง',
                sheets: [
                    { slug: 'dji', name: 'หุ้นดาวโจนส์' },
                    { slug: 'nikkei-morning', name: 'หุ้นนิคเคอิเช้า' },
                    { slug: 'szse-morning', name: 'หุ้นจีนเช้า' },
                    { slug: 'hsi-morning', name: 'หุ้นฮั่งเส็งเช้า' },
                    { slug: 'twse', name: 'หุ้นไต้หวัน' },
                    { slug: 'nikkei-afternoon', name: 'หุ้นนิคเคอิบ่าย' },
                    { slug: 'ktop30', name: 'หุ้นเกาหลี' },
                    { slug: 'szse-afternoon', name: 'หุ้นจีนบ่าย' },
                    { slug: 'hsi-afternoon', name: 'หุ้นฮั่งเส็งบ่าย' },
                    { slug: 'sgx', name: 'หุ้นสิงคโปร์' },
                    { slug: 'set', name: 'หุ้นไทยเย็น' },
                    { slug: 'bsesn', name: 'หุ้นอินเดีย' },
                    { slug: 'egx30', name: 'หุ้นอียิปต์' },
                    { slug: 'gdaxi', name: 'หุ้นเยอรมัน' },
                    { slug: 'moexbc', name: 'หุ้นรัสเซีย' },

            },
            {
                key: 'stock-vip',

                sheets: [
                    { slug: 'dowjones-vip', name: 'ดาวโจนส์ VIP' },
                    { slug: 'nikkei-vip-morning', name: 'นิคเคอิ VIP เช้า' },
                    { slug: 'szse-vip-morning', name: 'จีน VIP เช้า' },
                    { slug: 'hsi-vip-morning', name: 'ฮั่งเส็ง VIP เช้า' },
                    { slug: 'twse-vip', name: 'ไต้หวัน VIP' },

            group.sheets.map(sheet => ({ ...sheet, group: group.key }))

        const REFRESH_INTERVAL_SECONDS = 300; // 5 นาที
        const PERIODS = [30, 60, 90];
        const DAYS_OF_WEEK = [
            { name: 'ทั้งหมด', short: 'ทั้งหมด', index: -1 },
            { name: 'วันอาทิตย์', short: 'อา', index: 0 },
            { name: 'วันจันทร์', short: 'จ', index: 1 },
            { name: 'วันอังคาร', short: 'อ', index: 2 },
            { name: 'วันพุธ', short: 'พ', index: 3 },
            { name: 'วันพฤหัสบดี', short: 'พฤ', index: 4 },
            { name: 'วันศุกร์', short: 'ศ', index: 5 },
            { name: 'วันเสาร์', short: 'ส', index: 6 },
        ];

        let state = {
            activeSheet: SHEETS[0],
            period: 30,
            dayFilter: -1, // -1 for all days
            data: [],
            allDayData: [],

        // แปลงวันที่จาก href เช่น /result/xosohd?date=2026-04-20

        function parseDateFromHref(href) {
            const m = href && href.match(/date=(\d{4}-\d{2}-\d{2})/);
            if (!m) return null;
            const [y, mo, d] = m[1].split('-').map(Number);
            return new Date(Date.UTC(y, mo - 1, d));

        // แปลงวันที่แบบไทย เช่น "20 เม.ย. 69" → Date object ตามวันที่ที่เว็บแสดง
        function parseThaiDateText(text) {
            const m = text && text.match(/(\d{1,2})\s+([^\s]+)\s+(\d{2,4})/);
            if (!m) return null;
            const day = parseInt(m[1], 10);
            const monthNum = THAI_MONTHS[m[2]];
            const yearRaw = parseInt(m[3], 10);
            const yearShort = yearRaw > 2400 ? yearRaw - 2500 : yearRaw;
            if (isNaN(day) || !monthNum || isNaN(yearShort)) return null;
            const ceYear = (2500 + yearShort) - 543;
            return new Date(Date.UTC(ceYear, monthNum - 1, day));
        }

        function createResultRow(dateObject, top3Raw, bot2Raw) {
            if (!dateObject || !/^\d{1,3}$/.test(top3Raw) || !/^\d{1,2}$/.test(bot2Raw)) return null;

            const d = dateObject.getUTCDate().toString().padStart(2, '0');
            const mo = (dateObject.getUTCMonth() + 1).toString().padStart(2, '0');
            const y = dateObject.getUTCFullYear();

            return {
                date: `${d}/${mo}/${y}`,
                top3: top3Raw.padStart(3, '0'),
                bot2: bot2Raw.padStart(2, '0'),
                dateObject,
            };
        }

        function decodeSvelteKitData(data) {
            const seen = new Map();
            const hydrate = (value) => {
                if (typeof value === 'number') return hydrate(data[value]);
                if (Array.isArray(value)) return value.map(hydrate);
                if (value && typeof value === 'object') {
                    if (seen.has(value)) return seen.get(value);
                    const decoded = {};
                    seen.set(value, decoded);
                    Object.entries(value).forEach(([key, child]) => {
                        decoded[key] = hydrate(child);
                    });
                    return decoded;
                }
                return value;
            };
            return hydrate(data[0]);
        }

        // แยกข้อมูลหวยจาก HTML ของ LottoTH
        function parseLottoThHTML(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const results = [];

            const currentDateText = (doc.querySelector('h1')?.textContent || '').match(/วันที่\s+(\d{1,2}\s+[^\s]+\s+\d{2,4})/)?.[1];
            const currentNumbers = Array.from(doc.querySelectorAll('.lotto-card .card-body .result-number'))
                .map(node => (node.textContent || '').replace(/\D/g, ''))
                .filter(Boolean);
            if (currentDateText && currentNumbers.length >= 3) {
                const row = createResultRow(parseThaiDateText(currentDateText), currentNumbers[1], currentNumbers[2]);
                if (row) results.push(row);
            }

            doc.querySelectorAll('tbody tr').forEach(tr => {
                const cells = Array.from(tr.querySelectorAll('td')).map(cell => (cell.textContent || '').replace(/\s+/g, ' ').trim());
                if (cells.length < 3) return;
                const dateText = (cells[0].match(/วันที่\s+(\d{1,2}\s+[^\s]+\s+\d{2,4})/) || [])[1];
                const top3 = (cells[1].match(/\d{1,3}/) || [])[0];
                const bot2 = (cells[2].match(/\d{1,2}/) || [])[0];
                const row = createResultRow(parseThaiDateText(dateText), top3, bot2);
                if (row) results.push(row);
            });

            return results;
        }

        function parseRaakaadeeHTML(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const bodyText = doc.body
                ? (doc.body.innerText || doc.body.textContent || '').replace(/\s+/g, ' ')
                : html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
            const resultPattern = /ตรวจผล\s+.*?(?:ปิด\s+)?(?:จ\.|อ\.|พ\.|พฤ\.|ศ\.|ส\.|อา\.)?\s*(\d{1,2}\s+[^\s]+\s+\d{2,4}).*?3\s*ตัวบน\s*(?:\|\s*)?(\d{1,3}).*?2\s*ตัวล่าง\s*(?:\|\s*)?(\d{1,2})/g;
            const results = [];
            let match;
            while ((match = resultPattern.exec(bodyText)) !== null) {
                const row = createResultRow(parseThaiDateText(match[1]), match[2], match[3]);
                if (row) results.push(row);

            return results;

            }

            return {
                date: formatFormulaHistoryDate(targetDate),
                dateISO: targetDate.toISOString(),
                dayLabel: getDayLabel(dayIndex),
            };
        }

        function getGroupTop3DisplayName(groupKey) {
            if (groupKey === 'hanoi') return 'หวยฮานอยทั้งหมด';
            if (groupKey === 'lao') return 'หวยลาวทั้งหมด';
            const group = getLotteryGroup(groupKey);
            return group ? group.label : groupKey;
        }

        function normalizeRecentResultView(viewKey) {
            return ['single', 'hanoi', 'lao'].includes(viewKey) ? viewKey : 'single';
        }

        function parseDateInputValue(value) {
            const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!match) return null;
            const [, year, month, day] = match;
            const dateObject = new Date(Date.UTC(Number(year), Number(month) - 1, Number(day)));
            return isNaN(dateObject) ? null : dateObject;
        }

        function formatDateObjectForRowKey(dateObject) {
            if (!dateObject || isNaN(dateObject)) return '';
            const day = String(dateObject.getUTCDate()).padStart(2, '0');
            const month = String(dateObject.getUTCMonth() + 1).padStart(2, '0');
            const year = dateObject.getUTCFullYear();
            return `${day}/${month}/${year}`;
        }

        function isSameUtcDate(firstDate, secondDate) {
            return !!firstDate && !!secondDate &&
                firstDate.getUTCFullYear() === secondDate.getUTCFullYear() &&
                firstDate.getUTCMonth() === secondDate.getUTCMonth() &&
                firstDate.getUTCDate() === secondDate.getUTCDate();
        }

        function getRecentResultViewMeta(viewKey) {
            if (viewKey === 'hanoi') {
                return { title: 'หวยฮานอยทั้งหมด 9 ประเภท', groupKey: 'hanoi', isGroupView: true };
            }
            if (viewKey === 'lao') {
                return { title: 'หวยลาวทั้งหมด 14 ประเภท', groupKey: 'lao', isGroupView: true };
            }
            return {
                title: state.activeSheet && state.activeSheet.name ? state.activeSheet.name : 'สูตรวินย้อนหลัง',
                groupKey: state.activeSheet && state.activeSheet.group,
                isGroupView: false,
            };
        }

        function updateRecentResultControls(viewKey) {
            document.querySelectorAll('[data-recent-result-view]').forEach(button => {
                const isActive = button.dataset.recentResultView === viewKey;
                button.classList.toggle('bg-sky-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-sm', isActive);
                button.classList.toggle('text-slate-600', !isActive);
                button.classList.toggle('hover:bg-sky-50', !isActive);
                button.classList.toggle('hover:text-sky-700', !isActive);
                button.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });

            const daySelect = document.getElementById('recent-result-day-filter');
            if (daySelect && daySelect.value !== String(state.recentResultDayFilter)) {
                daySelect.value = String(state.recentResultDayFilter);
            }

            const dateInput = document.getElementById('recent-result-date-filter');
            if (dateInput && dateInput.value !== state.recentResultDateFilter) {
                dateInput.value = state.recentResultDateFilter || '';
            }
        }

        function getRecentResultRowsForView(viewKey) {
            const selectedDateObject = parseDateInputValue(state.recentResultDateFilter);
            const dayFilter = state.recentResultDayFilter;
            const filterRows = (rows) => {
                const sortedRows = sortUniqueRows(rows);
                const filteredRows = selectedDateObject
                    ? sortedRows.filter(row => isSameUtcDate(row.dateObject, selectedDateObject))
                    : dayFilter !== -1
                        ? sortedRows.filter(row => row.dateObject.getUTCDay() === dayFilter)
                        : sortedRows;
                return selectedDateObject ? filteredRows : filteredRows.slice(0, state.period);
            };

            if (viewKey === 'single') {
                const useAllRows = selectedDateObject || dayFilter !== -1;
                const sourceRows = useAllRows && state.allDayData.length ? state.allDayData : state.data;
                return filterRows(sourceRows).map(row => ({
                    row,
                    groupKey: state.activeSheet && state.activeSheet.group,
                    sourceName: state.activeSheet && state.activeSheet.name ? state.activeSheet.name : 'หวย',
                    sourceSlug: state.activeSheet && state.activeSheet.slug,
                    sheetOrder: 0,
                }));
            }

            const group = getLotteryGroup(viewKey);
            if (!group) return [];
            const groupState = getGroupTop3State(viewKey);
            return group.sheets
                .flatMap((sheet, sheetOrder) => filterRows(groupState.rowsBySlug[sheet.slug] || []).map(row => ({
                    row,
                    groupKey: viewKey,
                    sourceName: sheet.name,
                    sourceSlug: sheet.slug,
                    sheetOrder,
                })))
                .sort((a, b) =>
                    b.row.dateObject - a.row.dateObject ||
                    a.sheetOrder - b.sheetOrder ||
                    a.sourceName.localeCompare(b.sourceName)
                );
        }

        function buildGroupTop3PredictionPayload(groupKey, stats) {
            if (!stats || stats.loading || stats.winDigits7.length !== 7 || stats.winDigits8.length !== 8 || stats.winDigits9.length !== 9) return null;
            if (stats.sheetCount && stats.sheetWithDataCount < stats.sheetCount) return null;

            const target = getGroupTop3PredictionTargetDate();
            return {
                groupKey,
                groupName: getGroupTop3DisplayName(groupKey),
                date: target.date,
                dateISO: target.dateISO,
                dayLabel: target.dayLabel,
                dayFilter: state.groupTop3DayFilter,
                period: state.period,
                sheetWithDataCount: stats.sheetWithDataCount,
                sheetCount: stats.sheetCount,
                drawCount: stats.drawCount,
                digitCount: stats.digitCount,
                cutDigits: stats.cutDigits.join(' '),
                winDigits: stats.winDigits7.join(' '),
                winDigits7: stats.winDigits7.join(' '),
                winDigits8: stats.winDigits8.join(' '),
                winDigits9: stats.winDigits9.join(' '),
                generatedAt: new Date().toISOString(),
            };
        }

        function getGroupTop3PredictionSaveKey(prediction) {
            return [
                prediction.groupKey,
                prediction.date,
                prediction.dayFilter,
                prediction.period,
                prediction.cutDigits,
                prediction.winDigits7 || prediction.winDigits,
                prediction.winDigits8,
                prediction.winDigits9,
            ].join('|');
        }

        function upsertLocalGroupTop3Prediction(prediction) {
            if (!prediction || !prediction.groupKey) return;
            const rows = state.groupTop3PredictionRows[prediction.groupKey] || [];
            const existingIndex = rows.findIndex(row =>
                row.date === prediction.date &&
                row.dayLabel === prediction.dayLabel &&
                row.groupKey === prediction.groupKey
            );
            const normalized = deserializeGroupTop3Predictions([prediction])[0];
            if (!normalized) return;
            if (existingIndex >= 0) {
                rows[existingIndex] = normalized;
            } else {
                rows.unshift(normalized);
            }
            state.groupTop3PredictionRows[prediction.groupKey] = rows;
            state.groupTop3PredictionLoaded[prediction.groupKey] = true;
        }

        async function syncGroupTop3PredictionToSheet(groupKey, stats) {
            const prediction = buildGroupTop3PredictionPayload(groupKey, stats);
            if (!prediction) return;

            const saveKey = getGroupTop3PredictionSaveKey(prediction);
            if (state.groupTop3PredictionSaveKeys.has(saveKey)) return;
            state.groupTop3PredictionSaveKeys.add(saveKey);
            upsertLocalGroupTop3Prediction(prediction);

            const saved = await saveGroupTop3PredictionToGoogleSheet(prediction);
            if (!saved) {
                state.groupTop3PredictionSaveKeys.delete(saveKey);
            }
        }

        async function loadGroupSheetRows(slug) {
            const sheetRows = await loadGoogleSheetCache(slug);
            if (sheetRows.length) {
                saveCachedData(slug, sheetRows);
                return sortUniqueRows(sheetRows);
            }
            return sortUniqueRows(loadCachedData(slug));
        }

        async function loadGroupTop3Stats(force = false) {
            const groupKeys = ['hanoi', 'lao'];
            const needsLoad = force || groupKeys.some(groupKey => {
                const groupState = getGroupTop3State(groupKey);
                return !groupState.loaded && !groupState.loading;
            });

            if (!needsLoad) {
                renderGroupTop3StatsPanel();
                return;
            }

            const requestId = ++state.groupTop3RequestId;
            groupKeys.forEach(groupKey => {
                const groupState = getGroupTop3State(groupKey);
                groupState.loading = true;
                groupState.errorsBySlug = {};
                if (force) groupState.loaded = false;
            });
            renderGroupTop3StatsPanel();

            await Promise.all(groupKeys.map(async groupKey => {
                const group = getLotteryGroup(groupKey);
                const groupState = getGroupTop3State(groupKey);
                const results = await Promise.allSettled(group.sheets.map(async sheet => ({
                    sheet,
                    rows: await loadGroupSheetRows(sheet.slug),
                })));

                if (requestId !== state.groupTop3RequestId) return;

                const rowsBySlug = {};
                const errorsBySlug = {};
                results.forEach((result, index) => {
                    const sheet = group.sheets[index];
                    if (result.status === 'fulfilled') {
                        rowsBySlug[sheet.slug] = result.value.rows;
                    } else {
                        rowsBySlug[sheet.slug] = sortUniqueRows(loadCachedData(sheet.slug));
                        errorsBySlug[sheet.slug] = result.reason && result.reason.message
                            ? result.reason.message
                            : 'โหลดข้อมูลไม่ได้';
                    }
                });

                groupState.rowsBySlug = rowsBySlug;
                groupState.errorsBySlug = errorsBySlug;
                groupState.loading = false;
                groupState.loaded = true;
            }));

            if (requestId !== state.groupTop3RequestId) return;
            renderGroupTop3StatsPanel();
            renderRecentDataTable();
            if (window.lucide) lucide.createIcons();
        }

        function getRowsMissingFromBase(candidateRows, baseRows) {
            const existingDates = new Set((baseRows || []).map(row => row.date));
            return sortUniqueRows(candidateRows).filter(row => !existingDates.has(row.date));
        }

        async function fetchSheetData() {
            if (state.autoRefreshEnabled) {
                resetAutoRefreshTimer();
            }

            state.loading = true;
            state.error = null;
            renderUI();

            try {
                const slug = state.activeSheet.slug;
                try {
                    state.exphuayCatalog = await fetchExphuayCatalog();
                } catch (catalogErr) {
                    console.warn('Lottery catalog build failed', catalogErr);
                    state.exphuayCatalog = [];
                }

                let sheetRows = await loadGoogleSheetCache(slug);
                if (sheetRows.length) {
                    applyRowsToState(sheetRows, slug);
                } else {
                    const cachedData = loadCachedData(slug);
                    if (cachedData.length) {
                        applyRowsToState(cachedData, slug);
                        state.error = 'ยังไม่มีข้อมูลจาก Google Sheet สำหรับหวยนี้ จึงแสดงข้อมูลจริงล่าสุดที่บันทึกไว้ในเครื่องชั่วคราว';
                    } else {
                        state.data = [];
                        state.allDayData = [];
                    }
                }

                try {
                    const sourceRows = await fetchLotterySourceData(slug);
                    const allSourceRows = state.allDayData.length ? state.allDayData : sourceRows;
                    const missingRows = getRowsMissingFromBase(allSourceRows, sheetRows);
                    if (missingRows.length) {
                        const savedToSheet = await saveGoogleSheetCache(slug, missingRows);
                        sheetRows = await loadGoogleSheetCache(slug);
                        if (sheetRows.length) {
                            applyRowsToState(sheetRows, slug);
                            state.error = savedToSheet
                                ? `พบผลใหม่จากแหล่งผลหวย ${missingRows.length} งวด และบันทึกลง Google Sheet แล้ว`
                                : `พบผลใหม่จากแหล่งผลหวย ${missingRows.length} งวด แต่บันทึกลง Google Sheet ไม่สำเร็จ จึงยังแสดงข้อมูลจาก Sheet ล่าสุด`;
                        } else if (allSourceRows.length) {
                            applyRowsToState(allSourceRows, slug);
                            state.error = savedToSheet
                                ? `พบผลใหม่จากแหล่งผลหวย ${missingRows.length} งวด และบันทึกลง Google Sheet แล้ว แต่ยังโหลด Sheet กลับมาไม่ได้ จึงแสดงข้อมูลที่ดึงได้ชั่วคราว`
                                : `พบผลจากแหล่งผลหวย แต่บันทึกลง Google Sheet ไม่สำเร็จ จึงแสดงข้อมูลที่ดึงได้ชั่วคราว`;
                        }
                    }
                } catch (sourceErr) {
                    console.warn('Lottery source fetch failed', sourceErr);
                    if (sheetRows.length) {
                        state.error = `แสดงข้อมูลจาก Google Sheet แล้ว แต่ยังอ่านผลใหม่จากแหล่งผลหวยไม่ได้: ${sourceErr.message}`;
                    } else if (!state.error) {
                        throw sourceErr;
                    }
                }
            } catch (err) {
                console.error(err);
                const cachedData = loadCachedData(state.activeSheet.slug);
                if (cachedData.length) {
                    const filteredCachedData = state.dayFilter !== -1
                        ? cachedData.filter(row => row.dateObject.getUTCDay() === state.dayFilter)
                        : cachedData;
                    state.error = `การเชื่อมต่อมีปัญหา: ${err.message} (ใช้ข้อมูลจริงล่าสุดที่บันทึกไว้ชั่วคราว)`;
                    state.allDayData = cachedData;
                    state.data = filteredCachedData.slice(0, state.period);
                } else {
                    state.error = `การเชื่อมต่อมีปัญหา: ${err.message} (ยังไม่มีข้อมูลจริงใน Google Sheet หรือข้อมูลสำรองในเครื่อง)`;
                    state.data = [];
                    state.allDayData = [];
                }
            } finally {
                setTimeout(() => {
                    state.loading = false;
                    renderUI();
                }, 300);
            }
        }

        // --- ฟังก์ชันสำหรับอัปเดตอัตโนมัติ ---
        function resetAutoRefreshProgress(total = SHEETS.length) {
            state.autoRefreshProgress = {
                current: 0,
                total,
                saved: 0,
                failed: 0,
                lastName: '',
            };
        }

        function applyLoadedRowsAfterAutoRefresh(slug, rows) {
            const sortedRows = sortUniqueRows(rows);
            if (!sortedRows.length) return;

            saveCachedData(slug, sortedRows);
            syncGroupTop3Rows(slug, sortedRows);

            if (state.activeSheet && state.activeSheet.slug === slug) {
                const filteredRows = filterRowsForCurrentView(sortedRows);
                state.allDayData = sortedRows;
                state.data = filteredRows.slice(0, state.period);
            }
        }

        async function refreshSingleLotteryForAutoUpdate(sheet) {
            let sheetRows = await loadGoogleSheetCache(sheet.slug);
            const sourceRows = await fetchLotterySourceRows(sheet.slug);
            const missingRows = getRowsMissingFromBase(sourceRows, sheetRows);
            let savedToSheet = true;

            if (missingRows.length) {
                savedToSheet = await saveGoogleSheetCache(sheet.slug, missingRows);
                if (!savedToSheet) {
                    throw new Error(`บันทึกผลใหม่ ${missingRows.length} งวดลง Google Sheet ไม่สำเร็จ`);
                }
                if (savedToSheet) {
                    sheetRows = await loadGoogleSheetCache(sheet.slug);
                }
            }

            const rowsForDisplay = sheetRows.length ? sheetRows : sourceRows;
            applyLoadedRowsAfterAutoRefresh(sheet.slug, rowsForDisplay);

            return {
                slug: sheet.slug,
                name: sheet.name,
                saved: savedToSheet ? missingRows.length : 0,
                missing: missingRows.length,
                fetched: sourceRows.length,
                savedToSheet,
            };
        }

        async function refreshAllLotteriesForAutoUpdate() {
            if (state.autoRefreshInProgress) return;

            const sheetsToRefresh = SHEETS.slice();
            const batchSize = 4;
            resetAutoRefreshProgress(sheetsToRefresh.length);
            state.autoRefreshInProgress = true;
            updateRefreshStatus();

            const results = [];
            for (let start = 0; start < sheetsToRefresh.length; start += batchSize) {
                const batch = sheetsToRefresh.slice(start, start + batchSize);
                const batchResults = await Promise.all(batch.map(async sheet => {
                    try {
                        const result = await refreshSingleLotteryForAutoUpdate(sheet);
                        state.autoRefreshProgress.saved += result.saved;
                        return { ok: true, ...result };
                    } catch (err) {
                        state.autoRefreshProgress.failed++;
                        console.warn(`Auto update failed for ${sheet.slug}`, err);
                        return {
                            ok: false,
                            slug: sheet.slug,
                            name: sheet.name,
                            saved: 0,
                            error: err && err.message ? err.message : String(err),
                        };
                    } finally {
                        state.autoRefreshProgress.current++;
                        state.autoRefreshProgress.lastName = sheet.name;
                        updateRefreshStatus();
                    }
                }));
                results.push(...batchResults);
            }

            state.autoRefreshInProgress = false;

            const successCount = results.filter(result => result.ok).length;
            const savedCount = results.reduce((total, result) => total + (result.saved || 0), 0);
            const failedCount = results.length - successCount;

            state.error = failedCount
                ? `อัปเดตทุกหวยเสร็จแล้ว: เติมผลใหม่ ${savedCount} งวด, อ่านไม่ได้ ${failedCount} หวย และไม่เขียนทับผลที่มีอยู่แล้ว`
                : `อัปเดตทุกหวยเสร็จแล้ว: เติมผลใหม่ ${savedCount} งวด โดยไม่เขียนทับผลที่มีอยู่แล้ว`;

            renderUI();
            updateRefreshStatus();
        }

        async function runAutoRefreshCycle() {
            if (state.autoRefreshInProgress) return;
            if (state.autoRefreshEnabled) {
                resetAutoRefreshTimer();
            }
            await refreshAllLotteriesForAutoUpdate();
        }

        function updateRefreshStatus() {
            const statusEl = document.getElementById('refresh-status');
            if (!statusEl) return;

            if (state.autoRefreshInProgress) {
                const progress = state.autoRefreshProgress || {};
                statusEl.innerText = `อัปเดต ${progress.current || 0}/${progress.total || SHEETS.length}`;
                statusEl.classList.remove('text-amber-200');
                statusEl.classList.add('text-blue-200');
            } else if (state.autoRefreshEnabled && state.countdownIntervalId) {
                const minutes = Math.floor(state.countdown / 60);
                const seconds = state.countdown % 60;
                statusEl.innerText = `รีเฟรชใน ${minutes}:${seconds.toString().padStart(2, '0')}`;
                statusEl.classList.remove('text-amber-200');
                statusEl.classList.add('text-blue-200');
            } else {
                statusEl.innerText = 'ปิดใช้งาน';
                statusEl.classList.add('text-amber-200');
                statusEl.classList.remove('text-blue-200');
            }
        }

        function clearAutoRefreshTimers() {
            if (state.autoRefreshIntervalId) clearInterval(state.autoRefreshIntervalId);
            if (state.countdownIntervalId) clearInterval(state.countdownIntervalId);
            state.autoRefreshIntervalId = null;
            state.countdownIntervalId = null;
        }

        function resetAutoRefreshTimer() {
            clearAutoRefreshTimers(); // หยุด timer ที่มีอยู่

            state.countdown = REFRESH_INTERVAL_SECONDS;

            // ตั้งเวลาสำหรับดึงข้อมูลครั้งถัดไป
            state.autoRefreshIntervalId = setInterval(() => {
                if (state.loading || state.autoRefreshInProgress) return;
                runAutoRefreshCycle(); // การเรียกนี้จะรีเซ็ต timer อีกครั้ง
            }, REFRESH_INTERVAL_SECONDS * 1000);

            // ตั้งเวลานับถอยหลังเพื่อแสดงผลบน UI
            state.countdownIntervalId = setInterval(() => {
                state.countdown--;
                if (state.countdown < 0) {
                    state.countdown = 0;
                }
                updateRefreshStatus();
            }, 1000);

            updateRefreshStatus();
        }

        window.toggleAutoRefresh = function (isEnabled) {
            state.autoRefreshEnabled = isEnabled;
            if (isEnabled) {
                runAutoRefreshCycle(); // เริ่มดึงทุกหวยครั้งแรก ซึ่งจะไปกระตุ้นการตั้งเวลา
            } else {
                clearAutoRefreshTimers(); // หยุดการทำงานทั้งหมด
                updateRefreshStatus();
            }
        };

        // --- 4. ฟังก์ชันคำนวณสถิติ ---
        function calculateStats() {
            const counts = {
                top100: Array(10).fill(0),
                top10: Array(10).fill(0),
                top1: Array(10).fill(0),
                bot10: Array(10).fill(0),
                bot1: Array(10).fill(0),
            };

            state.data.forEach(record => {
                if (record.top3 && record.top3.length === 3) {
                    counts.top100[parseInt(record.top3[0])]++;
                    counts.top10[parseInt(record.top3[1])]++;
                    counts.top1[parseInt(record.top3[2])]++;
                }
                if (record.bot2 && record.bot2.length === 2) {
                    counts.bot10[parseInt(record.bot2[0])]++;
                    counts.bot1[parseInt(record.bot2[1])]++;
                }
            });

            return counts;
        }

        function getMostFrequent(arr) {
            const max = Math.max(...arr);
            const indices = [];
            arr.forEach((val, index) => {
                if (val === max && max > 0) indices.push(index);
            });
            return { numbers: indices, maxCount: max };
        }

        // --- ฟังก์ชันดึง N อันดับ (รวม tie ที่ cutoff)
        //     ascending=true  → เลือก N ที่ออกน้อยที่สุด เรียงน้อย→มาก
        //     ascending=false → เลือก N ที่ออกมากที่สุด เรียงมาก→น้อย ---
        function getTopN(dataArr, n, ascending = true) {
            const sorted = dataArr
                .map((count, num) => ({ num, count }))
                .sort((a, b) => ascending ? a.count - b.count : b.count - a.count);

            if (sorted.length <= n) return sorted.map(item => item.num);

            const cutoffCount = sorted[n - 1].count;

            return sorted
                .filter(item => ascending ? item.count <= cutoffCount : item.count >= cutoffCount)
                .map(item => item.num);
        }

        function shouldIncludeRepeatWinNumbers() {
            const checkbox = document.getElementById('top3-include-repeat');
            return checkbox ? checkbox.checked : true;
        }

        function getExcludedHottestWinRank() {
            return 0;
        }

        function getTop3CutCount() {
            const count = state.top3CutCount;
            return count === 2 ? 2 : 3;
        }

        function getTop3CutRankMode() {
            const mode = state.top3CutRankMode;
            if (mode === 'score') return 'score';
            if (mode === 'day-rotate') return 'day-rotate';
            return 'avoid-strong';
        }

        function getTop3CutRankStart() {
            const value = state.top3CutRankStart;
            const rank = Number(value);
            return Number.isInteger(rank) && rank >= 1 ? rank - 1 : null;
        }

        function getTop3CutRotationStart(candidateCount, cutCount) {
            const maxStart = Math.max(0, candidateCount - cutCount);
            if (maxStart === 0) return 0;

            const currentDayIndex = new Date().getDay();
            const activeSheetOffset = state.activeSheet && state.activeSheet.slug
                ? state.activeSheet.slug.split('').reduce((total, char) => total + char.charCodeAt(0), 0)
                : 0;
            return (currentDayIndex + activeSheetOffset) % (maxStart + 1);
        }

        function getTop3CutRankModeName() {
            const mode = getTop3CutRankMode();
            if (mode === 'score') return 'เรียงคะแนน';
            if (mode === 'day-rotate') return 'ขยับตามวัน';
            return 'หลบเลขแรงหน้าแรก';
        }

        function getTop3CutRankStartName() {
            const rankStart = getTop3CutRankStart();
            if (rankStart !== null) return `อันดับ ${rankStart + 1}`;
            return Number.isInteger(lastTop3CutRankStartIndex)
                ? `อันดับ ${lastTop3CutRankStartIndex + 1} (ตามวัน)`
                : 'อันดับตามวัน';
        }

        function selectTop3CutCandidateDigits(candidates, cutCount, avoidDigits = new Set()) {
            const mode = getTop3CutRankMode();
            if (mode === 'score') {
                return candidates.slice(0, cutCount).map(item => item.digit);
            }

            const manualStart = getTop3CutRankStart();
            const maxStart = Math.max(0, candidates.length - cutCount);
            if (mode === 'avoid-strong' && manualStart === null) {
                const maxScanStart = Math.min(4, maxStart);
                const rankedWindows = Array.from({ length: maxScanStart + 1 }, (_, start) => {
                    const windowDigits = candidates.slice(start, start + cutCount).map(item => item.digit);
                    const riskCount = windowDigits.filter(digit => avoidDigits.has(digit)).length;
                    const scoreTotal = candidates
                        .slice(start, start + cutCount)
                        .reduce((total, item) => total + item.score, 0);
                    return { start, windowDigits, riskCount, scoreTotal };
                }).sort((a, b) =>
                    a.riskCount - b.riskCount ||
                    a.scoreTotal - b.scoreTotal ||
                    a.start - b.start
                );
                const selectedWindow = rankedWindows[0] || { start: 0, windowDigits: [] };
                lastTop3CutRankStartIndex = selectedWindow.start;
                return selectedWindow.windowDigits;
            }

            const start = manualStart === null
                ? getTop3CutRotationStart(candidates.length, cutCount)
                : Math.min(manualStart, maxStart);
            lastTop3CutRankStartIndex = start;
            return candidates.slice(start, start + cutCount).map(item => item.digit);
        }

        let lastTop3CutFormulaParts = [];
        let lastTop3CutRankStartIndex = null;

        function buildTop3WinNumbers(rawValue, includeRepeats = shouldIncludeRepeatWinNumbers()) {
            const digits = [...new Set((rawValue.match(/\d/g) || []))];
            const results = new Set();

            for (const first of digits) {
                for (const second of digits) {
                    for (const third of digits) {
                        const isTriple = first === second && second === third;
                        const hasRepeat = first === second || first === third || second === third;
                        if (!isTriple && (includeRepeats || !hasRepeat)) {
                            results.add(`${first}${second}${third}`);
                        }
                    }
                }
            }

            return [...results];
        }

        window.updateCustomCutBacktest = function (rawValue) {

        function getCombinations(items, size) {
            const results = [];
            const walk = (start, combo) => {
                if (combo.length === size) {
                    results.push([...combo]);
                    return;
                }
                for (let index = start; index < items.length; index++) {
                    combo.push(items[index]);
                    walk(index + 1, combo);
                    combo.pop();
                }
            };
            walk(0, []);
            return results;
        }

        function scoreCustomCutDigits(rows, digits) {
            const cutSet = new Set(digits);
            return rows.reduce((passCount, row) => {
                if (!row || !row.top3) return passCount;
                const resultDigits = [...new Set(row.top3.split('').map(Number).filter(num => !isNaN(num)))];
                return resultDigits.some(digit => cutSet.has(digit)) ? passCount : passCount + 1;
            }, 0);
        }

        function getDerivedDigitsFromLatestTop3() {
            const latest = state.data.find(row => row.top3 && row.top3.length === 3);
            if (!latest) return [];

            const sum = latest.top3.split('').reduce((total, digit) => total + parseInt(digit, 10), 0);
            return [sum, sum + 1, sum + 2, sum + 3].map(value => value % 10);
        }

        function getPreviousDrawPatternDigits() {
            const latest = state.data.find(row => row.top3 && row.top3.length === 3);
            if (!latest) {
                return { follow: [], shuffle: [], run: [], sum: [], calendar: [] };
            }

            const top3 = latest.top3;
            const top3Num = parseInt(top3, 10);
            const followNumbers = [top3Num + 1, top3Num - 1, top3Num + 11, top3Num - 11]
                .filter(num => num >= 0 && num <= 999)
                .map(num => num.toString().padStart(3, '0'));
            const shuffleNumbers = [...new Set([
                `${top3[0]}${top3[2]}${top3[1]}`,
                `${top3[1]}${top3[0]}${top3[2]}`,
                `${top3[1]}${top3[2]}${top3[0]}`,
                `${top3[2]}${top3[0]}${top3[1]}`,
                `${top3[2]}${top3[1]}${top3[0]}`,
            ])];
            const firstDigit = parseInt(top3[0], 10);
            const runNumbers = [0, 1, 2].map(offset =>
                [0, 1, 2].map(step => (firstDigit + offset + step) % 10).join('')
            );
            const sum = top3.split('').reduce((total, digit) => total + parseInt(digit, 10), 0);
            const sumDigits = `${sum}`.split('').map(Number);
            const [day, month, year] = latest.date.split('/').map(Number);
            const calendarDigits = [day % 10, Math.floor(day / 10), month % 10, year % 10].filter(num => !isNaN(num));

            return {
                follow: [...new Set(followNumbers.join('').split('').map(Number))],
                shuffle: [...new Set(shuffleNumbers.join('').split('').map(Number))],
                run: [...new Set(runNumbers.join('').split('').map(Number))],
                sum: [...new Set(sumDigits)],
                calendar: [...new Set(calendarDigits)],
            };
        }

        function getStaleCounts() {
            const lastSeen = Array(10).fill(null);
            state.data.forEach((record, index) => {
                if (!record.top3 || record.top3.length !== 3) return;
                record.top3.split('').forEach(digit => {
                    const num = parseInt(digit, 10);
                    if (lastSeen[num] === null) {
                        lastSeen[num] = index;
                    }
                });
            });

            return lastSeen.map(value => value === null ? state.data.length + 1 : value);
        }

        function getSameDayCounts() {
            const counts = Array(10).fill(0);
            const latest = state.data.find(row => row.dateObject && row.top3 && row.top3.length === 3);
            if (!latest) return counts;

            const targetDay = state.dayFilter !== -1 ? state.dayFilter : latest.dateObject.getUTCDay();
            state.data.forEach(record => {
                if (!record.dateObject || !record.top3 || record.top3.length !== 3) return;
                if (record.dateObject.getUTCDay() !== targetDay) return;
                record.top3.split('').forEach(digit => {
                    counts[parseInt(digit, 10)]++;
                });
            });

            return counts;
        }

        function rankTop3WinDigits() {
            const frequencyCounts = Array(10).fill(0);
            const trendCounts = Array(10).fill(0);
            const trendWindow = state.period >= 90 ? 20 : state.period >= 60 ? 15 : 10;
            const recentRecords = state.data.slice(0, trendWindow);
            const derivedDigits = getDerivedDigitsFromLatestTop3();
            const previousPatterns = getPreviousDrawPatternDigits();
            const staleCounts = getStaleCounts();
            const sameDayCounts = getSameDayCounts();

            state.data.forEach(record => {
                if (!record.top3 || record.top3.length !== 3) return;
                record.top3.split('').forEach(digit => {
                    frequencyCounts[parseInt(digit, 10)]++;
                });
            });

            recentRecords.forEach((record, index) => {
                if (!record.top3 || record.top3.length !== 3) return;
                const weight = Math.max(1, trendWindow - index);
                record.top3.split('').forEach(digit => {
                    trendCounts[parseInt(digit, 10)] += weight;
                });
            });

            const maxFrequency = Math.max(...frequencyCounts, 1);
            const maxTrend = Math.max(...trendCounts, 1);
            const maxStale = Math.max(...staleCounts, 1);
            const maxSameDay = Math.max(...sameDayCounts, 1);
            const hotDigits = frequencyCounts
                .map((count, digit) => ({ digit, count }))
                .sort((a, b) => b.count - a.count || a.digit - b.digit);
            const trendingDigits = trendCounts
                .map((count, digit) => ({ digit, count }))
                .sort((a, b) => b.count - a.count || a.digit - b.digit);
            const staleDigits = staleCounts
                .map((missed, digit) => ({ digit, count: missed }))
                .sort((a, b) => b.count - a.count || a.digit - b.digit);
            const sameDayDigits = sameDayCounts
                .map((count, digit) => ({ digit, count }))
                .sort((a, b) => b.count - a.count || a.digit - b.digit);
            const patternDigitSet = new Set([
                ...previousPatterns.follow,
                ...previousPatterns.shuffle,
                ...previousPatterns.run,
                ...previousPatterns.sum,
                ...previousPatterns.calendar,
            ]);

            const ranked = Array.from({ length: 10 }, (_, digit) => {
                const frequencyScore = (frequencyCounts[digit] / maxFrequency) * 45;
                const trendScore = (trendCounts[digit] / maxTrend) * 18;
                const staleScore = (staleCounts[digit] / maxStale) * 10;
                const sameDayScore = (sameDayCounts[digit] / maxSameDay) * 10;
                const formulaScore = derivedDigits.includes(digit) ? 8 : 0;
                const patternScore = patternDigitSet.has(digit) ? 9 : 0;

                return {
                    digit,
                    frequency: frequencyCounts[digit],
                    trend: trendCounts[digit],
                    stale: staleCounts[digit],
                    sameDay: sameDayCounts[digit],
                    formula: derivedDigits.includes(digit),
                    pattern: patternDigitSet.has(digit),
                    score: frequencyScore + trendScore + staleScore + sameDayScore + formulaScore + patternScore,
                };
            }).sort((a, b) => b.score - a.score || b.frequency - a.frequency || a.digit - b.digit);

            ranked.hotDigits = hotDigits;
            ranked.trendingDigits = trendingDigits;
            ranked.staleDigits = staleDigits;
            ranked.sameDayDigits = sameDayDigits;
            ranked.previousPatterns = previousPatterns;
            ranked.trendWindow = trendWindow;
            return ranked;
        }

        function balanceTop3WinOmittedParity(selectedDigits, rankedDigits, limit) {
            if (limit !== 8 || selectedDigits.length !== 8) return selectedDigits;

            const selectedSet = new Set(selectedDigits.map(item => item.digit));
            const omittedDigits = rankedDigits.filter(item => !selectedSet.has(item.digit));
            if (omittedDigits.length !== 2) return selectedDigits;

            const omittedParity = omittedDigits.map(item => item.digit % 2);
            if (omittedParity[0] !== omittedParity[1]) return selectedDigits;

            const parityToAddBack = omittedParity[0];
            const parityToOmit = parityToAddBack === 0 ? 1 : 0;
            const digitToAddBack = omittedDigits.find(item => item.digit % 2 === parityToAddBack);
            const selectedIndexToOmit = selectedDigits
                .map((item, index) => ({ item, index }))
                .reverse()
                .find(entry => entry.item.digit % 2 === parityToOmit)?.index;

            if (!digitToAddBack || selectedIndexToOmit === undefined) return selectedDigits;

            const balancedDigits = [...selectedDigits];
            balancedDigits[selectedIndexToOmit] = digitToAddBack;
            return balancedDigits.sort((a, b) => rankedDigits.indexOf(a) - rankedDigits.indexOf(b));
        }

        function selectTop3WinDigits(limit = 7) {
            const rankedDigits = rankTop3WinDigits();
            const excludedHotRank = getExcludedHottestWinRank();
            const excludedHotDigits = excludedHotRank
                ? rankedDigits.hotDigits.slice(excludedHotRank - 1, excludedHotRank).map(item => item.digit)

            const excludedHotSet = new Set(excludedHotDigits);
            const returnDigits = [...rankedDigits]

                .slice(0, Math.min(4, 10))
                .map(item => item.digit);
            const selectedDigits = balanceTop3WinOmittedParity(rankedDigits
                .filter(item => !excludedHotSet.has(item.digit))
                .slice(0, limit), rankedDigits, limit);

            return {
                rankedDigits,
                selectedDigits,
                returnDigits,
                excludedHotDigits,
                digits: selectedDigits.map(item => item.digit),
            };
        }

                const keepSignals = [
                    latestDigits.has(digit),
                    flowKeepDigit,
                    recentGuardDigit,
                    patternKeepSet.has(digit),
                    returnSet.has(digit),

        function getTop3CutBacktestResult(row, rowIndex, limit = state.lastTop3WinLimit || 9) {
            if (!row || !row.top3 || row.top3.length !== 3) return null;

            const originalData = state.data;
            const originalAllDayData = state.allDayData;
            const allDayData = originalAllDayData && originalAllDayData.length ? originalAllDayData : originalData;
            const allDayRowIndex = allDayData.findIndex(item => item.date === row.date && item.top3 === row.top3);
            const historyData = originalData.slice(rowIndex + 1, rowIndex + 1 + state.period);
            const historyAllDayData = allDayRowIndex >= 0
                ? allDayData.slice(allDayRowIndex + 1, allDayRowIndex + 1 + state.period)
                : historyData;

            if (historyData.length < 3) return null;

            try {
                state.data = historyData;
                state.allDayData = historyAllDayData;

                const rankedDigits = rankTop3WinDigits();
                const { returnDigits, excludedHotDigits } = selectTop3WinDigits(limit);
                const allDayOmittedDigits = getTop3OmittedDigitsForData(historyAllDayData, limit);
                const targetDayIndex = row.dateObject ? row.dateObject.getUTCDay() : new Date().getDay();
                const currentDayOmittedDigits = getTop3OmittedDigitsForData(
                    historyAllDayData.filter(item => item.dateObject && item.dateObject.getUTCDay() === targetDayIndex),
                    limit
                );
                const previousAllDayOmittedDigits = getTop3OmittedDigitsForData(
                    historyAllDayData.slice(1, state.period + 1),
                    limit
                );
                const recommendation = getTop3CutRecommendation(rankedDigits, {
                    allDayOmittedDigits,
                    currentDayOmittedDigits,
                    previousAllDayOmittedDigits,
                    excludedHotDigits,
                    returnDigits,
                });
                const resultDigits = [...new Set(row.top3.split('').map(Number))];
                if (recommendation.cutDigits.length < getTop3CutCount()) {
                    return {
                        cutDigits: recommendation.cutDigits,
                        modeName: 'พักสูตร/งดตัด',
                        rankModeName: getTop3CutRankModeName(),
                        rankStartName: getTop3CutRankStartName(),
                        isPass: null,
                        isPaused: true,
                        hitCutDigits: [],
                    };
                }
                const cutSet = new Set(recommendation.cutDigits);
                const hitCutDigits = resultDigits.filter(digit => cutSet.has(digit));

                return {
                    cutDigits: recommendation.cutDigits,
                    modeName: recommendation.modeName,
                    rankModeName: getTop3CutRankModeName(),
                    rankStartName: getTop3CutRankStartName(),
                    isPass: hitCutDigits.length === 0,
                    hitCutDigits,
                };
            } finally {
                state.data = originalData;
                state.allDayData = originalAllDayData;
            }
        }

            state.top3CutCount = getTop3CutCount();

            if (top1El) top1El.innerText = topUnits.join(', ');

        function getGroupTop3DailyStep(groupKey) {
            const today = new Date();
            const dayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const dayNumber = Math.floor(dayStart.getTime() / 86400000);
            const groupOffset = String(groupKey || '')
                .split('')
                .reduce((total, char) => total + char.charCodeAt(0), 0);
            return dayNumber + groupOffset;
        }

        function getPingPongIndex(step, length) {
            if (length <= 1) return 0;
            const period = (length - 1) * 2;
            const position = ((step % period) + period) % period;
            return position < length ? position : period - position;
        }

        function buildGroupTop3RankGroups(ranked, sheetWithDataCount) {
            const maxLotteryCount = Math.max(sheetWithDataCount, ...ranked.map(item => item.lotteryCount), 1);
            return [
                { key: 'hot', label: 'กลุ่มร้อน', zone: 'hot', items: ranked.slice(0, 3) },
                { key: 'middle', label: 'กลุ่มกลาง', zone: 'middle', items: ranked.slice(3, 7) },
                { key: 'cold', label: 'กลุ่มเย็น', zone: 'cold', items: ranked.slice(7, 10) },
            ].map(group => ({
                ...group,
                items: group.items.map((item, index) => {
                    const rank = ranked.findIndex(rankedItem => rankedItem.digit === item.digit) + 1;
                    const spreadScore = (1 - (item.lotteryCount / maxLotteryCount)) * 10;
                    const positionScore = Math.max(0, group.items.length - index) * 5;
                    return {
                        ...item,
                        rank,
                        score: positionScore + spreadScore,
                        zone: group.zone,
                        groupKey: group.key,
                        groupLabel: group.label,
                        groupPosition: index + 1,
                        groupSize: group.items.length,
                    };
                }),
            }));
        }

        function selectRotatingGroupTop3CutItems(rankGroups, groupKey) {
            const dailyStep = getGroupTop3DailyStep(groupKey);
            const groupOrder = Array.from({ length: rankGroups.length }, (_, index) =>
                (index + dailyStep) % rankGroups.length
            );

            return groupOrder
                .map(groupIndex => {
                    const group = rankGroups[groupIndex];
                    if (!group || !group.items.length) return null;
                    const itemIndex = getPingPongIndex(dailyStep + (groupIndex * 2), group.items.length);
                    return group.items[itemIndex];
                })
                .filter(Boolean);
        }

        function getGroupTop3WinComboCount(digitCount, includeRepeats = true) {
            if (!digitCount) return 0;
            if (includeRepeats) return Math.max(0, Math.pow(digitCount, 3) - digitCount);
            if (digitCount < 3) return 0;
            return digitCount * (digitCount - 1) * (digitCount - 2);
        }

        function getGroupTop3WinDigitsFromCuts(cutDigits, winDigitCount) {
            const cutCount = Math.max(1, Math.min(3, 10 - winDigitCount));
            const cutSet = new Set((cutDigits || []).slice(0, cutCount).map(Number));
            return Array.from({ length: 10 }, (_, digit) => digit)
                .filter(digit => !cutSet.has(digit));
        }

        function getGroupTop3WinDigitsByCount(stats, winDigitCount) {
            if (!stats) return [];
            if (winDigitCount === 9) return stats.winDigits9 || [];
            if (winDigitCount === 8) return stats.winDigits8 || [];
            return stats.winDigits7 || stats.winDigits || [];
        }

        function buildGroupTop3Frequency(groupKey) {
            const group = getLotteryGroup(groupKey);
            const groupState = getGroupTop3State(groupKey);
            const counts = Array(10).fill(0);
            const lotteriesByDigit = Array.from({ length: 10 }, () => new Set());
            let drawCount = 0;
            let digitCount = 0;
            let sheetWithDataCount = 0;

            group.sheets.forEach(sheet => {
                const rows = sortUniqueRows(groupState.rowsBySlug[sheet.slug] || []);
                const filteredRows = state.groupTop3DayFilter !== -1
                    ? rows.filter(row => row.dateObject.getUTCDay() === state.groupTop3DayFilter)
                    : rows;
                const periodRows = filteredRows.slice(0, state.period);
                if (periodRows.length) sheetWithDataCount++;
                drawCount += periodRows.length;

                periodRows.forEach(row => {
                    if (!row.top3 || row.top3.length !== 3) return;
                    row.top3.split('').forEach(digitText => {
                        const digit = Number(digitText);
                        if (!Number.isInteger(digit) || digit < 0 || digit > 9) return;
                        counts[digit]++;
                        digitCount++;
                        lotteriesByDigit[digit].add(sheet.name);
                    });
                });
            });

            const ranked = counts
                .map((count, digit) => ({
                    digit,
                    count,
                    lotteryCount: lotteriesByDigit[digit].size,
                }))
                .sort((a, b) =>
                    b.count - a.count ||
                    a.digit - b.digit
                );
            const rankGroups = digitCount
                ? buildGroupTop3RankGroups(ranked, sheetWithDataCount)
                : [];
            const scoredCutDigits = rankGroups.flatMap(group => group.items);
            const scoreByDigit = new Map(scoredCutDigits.map(item => [item.digit, item]));
            ranked.forEach(item => {
                const scoreItem = scoreByDigit.get(item.digit);
                item.cutScore = scoreItem ? scoreItem.score : 0;
                item.cutRank = scoreItem ? scoreItem.rank : 0;
                item.cutZone = scoreItem ? scoreItem.zone : 'cold';
                item.cutGroupLabel = scoreItem ? scoreItem.groupLabel : '';
                item.cutGroupPosition = scoreItem ? scoreItem.groupPosition : 0;
            });
            const cutItems = selectRotatingGroupTop3CutItems(rankGroups, groupKey);
            const cutDigits = cutItems.map(item => item.digit);
            const winDigits7 = digitCount ? getGroupTop3WinDigitsFromCuts(cutDigits, 7) : [];
            const winDigits8 = digitCount ? getGroupTop3WinDigitsFromCuts(cutDigits, 8) : [];
            const winDigits9 = digitCount ? getGroupTop3WinDigitsFromCuts(cutDigits, 9) : [];
            const winDigits = winDigits7;
            const winComboCount = getGroupTop3WinComboCount(winDigits.length, true);

            return {
                ranked,
                cutDigits,
                winDigits,
                winDigits7,
                winDigits8,
                winDigits9,
                winComboCount,
                scoredCutDigits,
                cutItems,
                formulaName: 'สูตรกลุ่มละ 1 ตัวหมุนรายวัน',
                drawCount,
                digitCount,
                sheetCount: group.sheets.length,
                sheetWithDataCount,
                errorCount: Object.keys(groupState.errorsBySlug || {}).length,
                loading: groupState.loading,
                loaded: groupState.loaded,
            };
        }
